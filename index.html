<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💧 파이프 수압시험 압력 계산기</title>
    <style>
        /* 기본 스타일 및 맑은 고딕 설정 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        /* 메인 윈도우 스타일 (반응형 최적화) */
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px 20px;
            box-sizing: border-box;
            margin-bottom: 250px; /* 조건이 늘어나 여백을 조금 더 확보 */
        }

        /* 주 제목 스타일 */
        .main-title {
            font-size: 16pt;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        /* 섹션 타이틀 */
        .section-title {
            font-size: 13pt;
            font-weight: bold;
            color: #000000;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* 1. 라디오 버튼 섹션 */
        .radio-group {
            display: flex;
            gap: 40px;
            padding-left: 5px;
            margin-bottom: 25px;
        }

        .radio-label {
            font-size: 12pt;
            font-weight: bold;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        #pb-label { color: #1f77b4; }
        #pert-label { color: #e377c2; }

        .radio-label input {
            margin-right: 8px;
            transform: scale(1.2);
        }

        /* 2. 입력 필드 섹션 */
        .input-grid {
            display: grid;
            grid-template-columns: 130px 1fr;
            row-gap: 12px;
            align-items: center;
            padding-left: 5px;
            margin-bottom: 30px;
        }

        .input-grid label {
            font-size: 11pt;
            font-weight: bold;
            color: #000000;
        }

        .input-grid input {
            width: 100%;
            max-width: 160px;
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 12pt;
            padding: 8px 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            inputmode: decimal;
        }

        /* 3. 결과 출력 섹션 (LabelFrame 스타일) */
        .result-frame {
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 10px 15px;
            position: relative;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .result-frame legend {
            font-size: 10pt;
            font-weight: bold;
            padding: 0 5px;
            color: #333333;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .result-title {
            font-size: 11pt;
            font-weight: bold;
            color: #333333;
        }

        .result-values {
            display: flex;
            align-items: baseline;
            gap: 5px;
            flex-shrink: 0;
        }

        .res-main {
            font-size: 15pt;
            font-weight: bold;
        }

        .res-sub {
            font-size: 11pt;
            color: gray;
        }

        /* 🎨 온도 조건별 결과 색상 지정 */
        .color-20 { color: #1f77b4; }  /* 20℃ 조건: 파란색 */
        .color-95 { color: #d62728; }  /* 95℃ 조건: 빨간색 */

        /* 구분선 */
        .divider {
            height: 1px;
            background-color: #dddddd;
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">💧 파이프 수압시험 압력 계산기</div>

    <div class="section-title">1. 파이프 종류를 선택하세요</div>
    <div class="radio-group">
        <label class="radio-label" id="pb-label">
            <input type="radio" name="pipe_type" value="PB" checked> PB Pipe
        </label>
        <label class="radio-label" id="pert-label">
            <input type="radio" name="pipe_type" value="PE-RT"> PE-RT Type II
        </label>
    </div>

    <div class="section-title">2. 시료의 치수를 입력하세요</div>
    <div class="input-grid">
        <label for="entry_dem">평균외경 (mm)</label>
        <input type="number" id="entry_dem" step="any" min="0" inputmode="decimal" placeholder="외경 입력">

        <label for="entry_emin">최소두께 (mm)</label>
        <input type="number" id="entry_emin" step="any" min="0" inputmode="decimal" placeholder="두께 입력">
    </div>

    <fieldset class="result-frame">
        <legend> 📊 산출된 시험압력 </legend>
        
        <div class="result-row">
            <div class="result-title">① 20℃, 1시간 :</div>
            <div class="result-values">
                <span class="res-main color-20" id="res1-main">0.00 bar</span>
                <span class="res-sub" id="res1-sub">(0.00 kgf/cm²)</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="result-row">
            <div class="result-title">② 95℃, 22시간 :</div>
            <div class="result-values">
                <span class="res-main color-95" id="res2-main">0.00 bar</span>
                <span class="res-sub" id="res2-sub">(0.00 kgf/cm²)</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="result-row">
            <div class="result-title">③ 95℃, 165시간 :</div>
            <div class="result-values">
                <span class="res-main color-95" id="res3-main">0.00 bar</span>
                <span class="res-sub" id="res3-sub">(0.00 kgf/cm²)</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="result-row">
            <div class="result-title">④ 95℃, 1000시간 :</div>
            <div class="result-values">
                <span class="res-main color-95" id="res4-main">0.00 bar</span>
                <span class="res-sub" id="res4-sub">(0.00 kgf/cm²)</span>
            </div>
        </div>
    </fieldset>
</div>

<script>
    const entryDem = document.getElementById('entry_dem');
    const entryEmin = document.getElementById('entry_emin');
    
    const res1Main = document.getElementById('res1-main');
    const res1Sub = document.getElementById('res1-sub');
    const res2Main = document.getElementById('res2-main');
    const res2Sub = document.getElementById('res2-sub');
    const res3Main = document.getElementById('res3-main');
    const res3Sub = document.getElementById('res3-sub');
    const res4Main = document.getElementById('res4-main');
    const res4Sub = document.getElementById('res4-sub');
    
    const radioButtons = document.querySelectorAll('input[name="pipe_type"]');

    function clearResults() {
        const textMain = "0.00 bar";
        const textSub = "(0.00 kgf/cm²)";
        
        res1Main.textContent = textMain; res1Sub.textContent = textSub;
        res2Main.textContent = textMain; res2Sub.textContent = textSub;
        res3Main.textContent = textMain; res3Sub.textContent = textSub;
        res4Main.textContent = textMain; res4Sub.textContent = textSub;
    }

    function calculate() {
        const d_em_str = entryDem.value.trim();
        const e_min_str = entryEmin.value.trim();

        if (!d_em_str || !e_min_str) {
            clearResults();
            return;
        }

        const d_em = parseFloat(d_em_str);
        const e_min = parseFloat(e_min_str);

        if (isNaN(d_em) || isNaN(e_min) || d_em <= e_min) {
            clearResults();
            return;
        }

        let pipeType = "";
        radioButtons.forEach(radio => {
            if (radio.checked) { pipeType = radio.value; }
        });

        // 원주응력(σ, MPa) 변수 설정
        let sigma_1 = 0, sigma_2 = 0, sigma_3 = 0, sigma_4 = 0;
        
        if (pipeType === "PB") {
            sigma_1 = 15.5; // 20℃, 1h
            sigma_2 = 6.5;  // 95℃, 22h
            sigma_3 = 6.2;  // 95℃, 165h (추가)
            sigma_4 = 6.0;  // 95℃, 1000h (추가)
        } else if (pipeType === "PE-RT") {
            sigma_1 = 10.8; // 20℃, 1h
            sigma_2 = 3.9;  // 95℃, 22h
            sigma_3 = 3.7;  // 95℃, 165h (추가)
            sigma_4 = 3.6;  // 95℃, 1000h (추가)
        } else {
            return;
        }

        // 무차원 치수 항 계산
        const dimension_factor = (2 * e_min) / (d_em - e_min);
        
        // 각각의 조건별 MPa 계산
        const p_mpa_1 = sigma_1 * dimension_factor;
        const p_mpa_2 = sigma_2 * dimension_factor;
        const p_mpa_3 = sigma_3 * dimension_factor;
        const p_mpa_4 = sigma_4 * dimension_factor;

        // 단위 환산 (bar 및 kgf/cm²) 업데이트 함수
        updateRow(res1Main, res1Sub, p_mpa_1);
        updateRow(res2Main, res2Sub, p_mpa_2);
        updateRow(res3Main, res3Sub, p_mpa_3);
        updateRow(res4Main, res4Sub, p_mpa_4);
    }

    function updateRow(mainElem, subElem, mpaValue) {
        const bar = mpaValue * 10.0;
        const kg = mpaValue * 10.197162;
        mainElem.textContent = `${bar.toFixed(2)} bar`;
        subElem.textContent = `(${kg.toFixed(2)} kgf/cm²)`;
    }

    // 모바일 포커스 시 자동 스크롤
    const inputs = [entryDem, entryEmin];
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            setTimeout(() => {
                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        });
    });

    // 최소두께에서 엔터 누르면 키보드 닫기
    entryEmin.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            entryEmin.blur();
        }
    });

    entryDem.addEventListener('input', calculate);
    entryEmin.addEventListener('input', calculate);
    radioButtons.forEach(radio => {
        radio.addEventListener('change', calculate);
    });
</script>

</body>
</html>
